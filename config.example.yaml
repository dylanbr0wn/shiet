# shiet app/runtime configuration (optional).
# Copy to one of:
#   - ~/.config/shiet/config.yaml
#   - <UserConfigDir>/shiet/config.yaml  (e.g. ~/Library/Application Support/shiet on macOS)
#   - ./shiet.yaml  (local dev, cwd)
#
# Environment variables override file values (highest precedence):
#   SHIET_DB                       -> db.path
#   SHIET_LOG_PATH                 -> log.path
#   SHIET_LOG_LEVEL                -> log.level
#   SHIET_GOOGLE_AUTH_MODE         -> google.auth_mode
#   SHIET_GOOGLE_BROKER_BASE_URL   -> google.broker_base_url
#   SHIET_GOOGLE_CLIENT_ID         -> google.client_id
#   SHIET_GOOGLE_CLIENT_SECRET     -> google.client_secret
#   SHIET_GITHUB_AUTH_MODE         -> github.auth_mode
#   SHIET_GITHUB_BROKER_BASE_URL   -> github.broker_base_url
#   SHIET_GITHUB_CLIENT_ID         -> github.client_id
#   SHIET_GITHUB_CLIENT_SECRET     -> github.client_secret
#   SHIET_SLACK_AUTH_MODE          -> slack.auth_mode
#   SHIET_SLACK_BROKER_BASE_URL    -> slack.broker_base_url
#   SHIET_SLACK_CLIENT_ID          -> slack.client_id
#   SHIET_SLACK_CLIENT_SECRET      -> slack.client_secret
#
# Logging (shared zerolog stack; see docs/logging.md):
# log.path defaults to a sibling of shiet.db under <UserConfigDir>/shiet/shiet.log.
# log.level: trace|debug|info|warn|error|fatal|panic|disabled (default: info).
# In `wails dev`, logs also mirror to stderr; production writes the file only.
# Settings → General → Logs shows this path and a Reveal/Open log folder button (DYL-122).
#
# google.auth_mode:
#   - broker (public default when no local client_id is set): secret-only OAuth broker;
#     no desktop client_secret required or retained
#   - local: BYO/desktop OAuth with google.client_id (+ client_secret when Google requires it)
#   - omit auth_mode with a client_id set to keep existing BYO configs on local mode
#
# Public builds default to broker mode and must not embed a shared Google client_secret.
# Google Desktop OAuth clients may require client_secret at the token endpoint in local mode,
# but desktop apps cannot keep it confidential once shipped.
#
# github.auth_mode mirrors Google:
#   - broker (public default): the hosted broker owns the shared GitHub OAuth App secret
#   - local: PAT-only, or BYO GitHub OAuth App credentials when both client_id and
#     client_secret are set
#     Register http://127.0.0.1/oauth/callback; GitHub permits the desktop flow
#     to supply the runtime loopback port.
# A personal access token can be entered from GitHub settings in either mode.
#
# slack.auth_mode mirrors GitHub (OAuth only; no PAT path):
#   - broker (public default): the hosted broker owns the shared Slack app secret
#   - local: BYO Slack app credentials when both client_id and client_secret are set

db:
  path: ~/.config/shiet/shiet.db

log:
  path: ~/.config/shiet/shiet.log
  level: info

google:
  auth_mode: broker
  broker_base_url: https://auth.shiet.app
  client_id: ""
  client_secret: ""

github:
  auth_mode: broker
  broker_base_url: https://auth.shiet.app
  client_id: ""
  client_secret: ""

slack:
  auth_mode: broker
  broker_base_url: https://auth.shiet.app
  client_id: ""
  client_secret: ""
