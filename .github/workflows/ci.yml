name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.71.0

      - name: Lint Protobuf contracts
        run: buf lint

      - name: Check generated API sources
        run: |
          buf generate
          git diff --exit-code -- gen frontend/src/gen

      - name: Check Protobuf compatibility
        run: |
          if git cat-file -e origin/main:buf.yaml 2>/dev/null; then
            buf breaking --against '.git#branch=origin/main'
          fi

      - name: Run Go tests
        run: go test ./internal/...

      - name: Google OAuth pre-build checks
        run: ./scripts/prebuild-oauth-check.sh

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: frontend
        run: pnpm typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test
