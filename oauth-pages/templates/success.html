<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shiet — Authorization complete</title>
<style>{{.Styles}}</style>
<meta http-equiv="refresh" content="0;url={{.HandoffURL}}">
</head>
<body>
<main class="page">
  <div class="shell">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="app-name">shiet</span>
    </div>
    <div class="copy">
      <h1 class="headline success">
        <svg class="headline-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Authorization complete
      </h1>
      <p class="lede">Return to shiet to finish connecting {{.ProviderName}}.</p>
    </div>
    <div class="actions">
      <a class="button" href="{{.HandoffURL}}">Open shiet</a>
      <p class="hint">Redirecting automatically…</p>
    </div>
  </div>
</main>
</body>
</html>
